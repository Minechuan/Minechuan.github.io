<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>编译原理 · 课程笔记</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="编译原理课程笔记首页">
        <span class="brand-mark">λ</span>
        <span>
          <strong>编译原理</strong>
          <small>Course Notes</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="站点导航">
        <a href="note.html?file=addnote.md">添加笔记</a>
        <a href="../">课程目录</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Compiler Principles</p>
          <h1>从字符流到可执行程序的结构化旅程</h1>
          <p class="hero-text">
            这里整理词法分析、语法分析、语义检查、中间表示、运行时、代码生成与优化等主题的双语课程笔记。
          </p>
          <div class="hero-actions">
            <a class="button primary" href="note.html?note=Lec1&lang=zh">开始阅读 Lec1</a>
            <a class="button ghost" href="note.html?file=addnote.md">如何新增笔记</a>
          </div>
        </div>

        <div class="syntax-panel" aria-hidden="true">
          <div class="syntax-tree hero-tree">
            <span class="tree-node root" data-flow>Program</span>
            <span class="tree-node n1">Decl</span>
            <span class="tree-node n2">Stmt</span>
            <span class="tree-node n3">Expr</span>
            <span class="tree-node n4">Token</span>
            <span class="tree-node n5">IR</span>
            <span class="tree-edge e1"></span>
            <span class="tree-edge e2"></span>
            <span class="tree-edge e3"></span>
            <span class="tree-edge e4"></span>
            <span class="tree-edge e5"></span>
          </div>
        </div>
      </section>

      <section class="notes-section" aria-labelledby="notes-title">
        <div class="section-heading">
          <p class="eyebrow">Notes</p>
          <h2 id="notes-title">课程笔记</h2>
        </div>
        <div id="notes-list" class="notes-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>GitHub Pages ready · Static Markdown notes</span>
      <span>Last template update: 2026-06-16</span>
    </footer>

        },
        {

        },
        {
          id: "Lec5",

          summaryZh: "系统学习 AST、DAG、CFG、三地址代码、SSA，以及基于属性文法生成 IR 的核心方法。",

          summaryZh: "系统学习运行时环境、存储组织、活动记录、调用约定、栈/堆管理，以及玩具语言的类三地址 IR。",

      list.innerHTML = NOTES.map((note) => `

            <time datetime="${note.updated}">${note.updated}</time>
          </div>
          <h3>${note.titleZh}</h3>
          <p>${note.titleEn}</p>
          <p class="summary">${note.summaryZh}</p>
